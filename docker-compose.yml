services:
  postgres:
    image: postgres:17
    container_name: openltap-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    command:
      - postgres
      # Dev-only: avoid full-page images in WAL so the decoder sees plain
      # tuple records from day one. FPI handling is milestone M2.
      - -c
      - full_page_writes=off
      - -c
      - wal_level=replica
      - -c
      - max_wal_senders=4
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 15

  minio:
    image: minio/minio:latest
    container_name: openltap-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 2s
      retries: 15

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/lake &&
      echo 'bucket lake ready'
      "
