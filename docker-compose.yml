services:
  postgres:
    # Override with LTAP_PG=18 to test against another major version.
    image: postgres:${LTAP_PG:-17}
    container_name: openltap-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    command:
      - postgres
      # Production default: the decoder extracts tuples from full-page
      # images (M2b). wal_compression off or pglz both work; lz4/zstd don't yet.
      - -c
      - full_page_writes=on
      - -c
      - wal_level=replica
      - -c
      - max_wal_senders=4
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 15

  minio:
    image: minio/minio:latest
    container_name: openltap-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 2s
      retries: 15

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/lake &&
      echo 'bucket lake ready'
      "
